{% extends 'base.html' %}
{% block content %}
<div class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="mb-8">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-4">
                    <a href="{% url 'nyarap_nanti:wishlist_page' %}" 
                       class="text-gray-600 hover:text-gray-900 transition duration-300">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                  d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                    </a>
                    <h1 class="text-3xl font-bold text-gray-900">{{ collection.name }}</h1>
                </div>
                <div class="flex gap-4">
                    <button onclick="selectAll()" 
                            class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">
                        Select All
                    </button>
                    <button onclick="deselectAll()" 
                            class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">
                        Deselect All
                    </button>
                    <form id="addToCollectionForm" method="POST" action="{% url 'nyarap_nanti:add_to_collection' collection.id %}">
                        {% csrf_token %}
                        <input type="hidden" id="selectedItems" name="selected_items" value="[]">
                        <button type="submit" 
                                class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                            Add Selected to Collection
                        </button>
                    </form>
                </div>
            </div>
            <p class="text-gray-600">Discover all restaurants in this collection</p>
        </div>

        <!-- Wishlist Items Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            {% for item in wishlist_items %}
            <div class="relative bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition duration-300">
                <div class="absolute top-2 left-2 z-10">
                    <input type="checkbox" 
                           class="restaurant-checkbox w-5 h-5 rounded border-gray-300"
                           value="{{ item.id }}"
                           onchange="updateSelectedItems()">
                </div>
                
                <div class="relative">
                    <img src="{{ item.image_url }}" 
                         class="w-full h-48 object-cover" 
                         alt="{{ item.name }}">
                    <div class="absolute bottom-0 left-0 right-0 px-4 py-2 bg-gradient-to-t from-black/60 to-transparent">
                        <h3 class="text-white font-semibold">{{ item.name }}</h3>
                    </div>
                </div>
                <div class="p-4">
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="px-3 py-1 rounded-full bg-gray-100 text-sm text-gray-600">
                            {{ item.category }}
                        </span>
                        <span class="px-3 py-1 rounded-full bg-gray-100 text-sm text-gray-600">
                            {{ item.location }}
                        </span>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
    function selectAll() {
        document.querySelectorAll('.restaurant-checkbox').forEach(checkbox => {
            checkbox.checked = true;
        });
        updateSelectedItems();
    }

    function deselectAll() {
        document.querySelectorAll('.restaurant-checkbox').forEach(checkbox => {
            checkbox.checked = false;
        });
        updateSelectedItems();
    }

    function updateSelectedItems() {
        const selectedCheckboxes = document.querySelectorAll('.restaurant-checkbox:checked');
        const selectedValues = Array.from(selectedCheckboxes).map(cb => cb.value);
        document.getElementById('selectedItems').value = JSON.stringify(selectedValues);
    }
</script>
{% endblock %}
